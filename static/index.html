<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQB Legal AI | Operator Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="text-gray-800 bg-gray-100">

    <nav class="bg-blue-900 text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="text-xl font-bold tracking-wider">🏦 SQB Legal AI</div>
            <div class="flex gap-4 text-sm">
                <button onclick="showPage('dashboard')" id="navDashboard" class="hover:text-blue-300 font-semibold border-b-2 border-white pb-1">Dashboard</button>
                <button onclick="showPage('audit')" id="navAudit" class="hover:text-blue-300">Audit Trail</button>
            </div>
            <div class="text-sm">Yuridik Murojaatlarni Boshqarish Tizimi</div>
        </div>
    </nav>

    <!-- DASHBOARD PAGE -->
    <div id="pageDashboard">
        <main class="max-w-6xl mx-auto mt-8 p-4">

            <!-- STATS -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 text-center">
                    <div id="statTotal" class="text-3xl font-bold text-blue-900">0</div>
                    <div class="text-xs text-gray-500 mt-1">Jami Murojaatlar</div>
                </div>
                <div class="bg-white rounded-lg shadow-sm border border-yellow-200 p-4 text-center">
                    <div id="statPending" class="text-3xl font-bold text-yellow-600">0</div>
                    <div class="text-xs text-gray-500 mt-1">Kutilmoqda</div>
                </div>
                <div class="bg-white rounded-lg shadow-sm border border-green-200 p-4 text-center">
                    <div id="statApproved" class="text-3xl font-bold text-green-600">0</div>
                    <div class="text-xs text-gray-500 mt-1">Tasdiqlangan</div>
                </div>
                <div class="bg-white rounded-lg shadow-sm border border-red-200 p-4 text-center">
                    <div id="statRejected" class="text-3xl font-bold text-red-600">0</div>
                    <div class="text-xs text-gray-500 mt-1">Rad etilgan</div>
                </div>
            </div>

            <!-- UPLOAD -->
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 mb-8 flex justify-between items-center">
                <div>
                    <h2 class="text-lg font-semibold text-blue-900">Yangi murojaat yuklash</h2>
                    <p class="text-sm text-gray-500">Prokuratura, soliq yoki MB so'rovlarini (PDF/DOCX) yuklang.</p>
                </div>
                <div>
                    <input type="file" id="fileInput" class="hidden" onchange="uploadFile()">
                    <button id="uploadBtn" onclick="document.getElementById('fileInput').click()"
                        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded shadow transition">
                        + Fayl Yuklash
                    </button>
                </div>
            </div>

            <h2 class="text-xl font-bold text-gray-700 mb-4">So'nggi Murojaatlar</h2>
            <div id="requestsList" class="space-y-6"></div>
        </main>
    </div>

    <!-- AUDIT PAGE -->
    <div id="pageAudit" class="hidden">
        <main class="max-w-6xl mx-auto mt-8 p-4">
            <h2 class="text-xl font-bold text-gray-700 mb-4">📋 Audit Trail</h2>
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                <table class="w-full text-sm">
                    <thead class="bg-blue-900 text-white">
                        <tr>
                            <th class="p-3 text-left">ID</th>
                            <th class="p-3 text-left">Fayl</th>
                            <th class="p-3 text-left">Tur</th>
                            <th class="p-3 text-left">Risk</th>
                            <th class="p-3 text-left">Ishonch</th>
                            <th class="p-3 text-left">Holat</th>
                            <th class="p-3 text-left">Yuklangan</th>
                            <th class="p-3 text-left">Tasdiqlangan</th>
                        </tr>
                    </thead>
                    <tbody id="auditTable" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        let allRequests = [];

        function showPage(page) {
            document.getElementById('pageDashboard').classList.add('hidden');
            document.getElementById('pageAudit').classList.add('hidden');
            document.getElementById('navDashboard').classList.remove('border-b-2', 'border-white');
            document.getElementById('navAudit').classList.remove('border-b-2', 'border-white');
            if (page === 'dashboard') {
                document.getElementById('pageDashboard').classList.remove('hidden');
                document.getElementById('navDashboard').classList.add('border-b-2', 'border-white');
            } else {
                document.getElementById('pageAudit').classList.remove('hidden');
                document.getElementById('navAudit').classList.add('border-b-2', 'border-white');
                renderAudit();
            }
        }

        function renderAudit() {
            const tbody = document.getElementById('auditTable');
            if (allRequests.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="p-4 text-center text-gray-400 italic">Hozircha amaliyotlar yo'q</td></tr>`;
                return;
            }
            tbody.innerHTML = allRequests.map(req => `
                <tr class="hover:bg-gray-50">
                    <td class="p-3 font-mono text-xs text-gray-500">${req.id}</td>
                    <td class="p-3">${req.filename}</td>
                    <td class="p-3"><span class="bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded">${req.classification.tur}</span></td>
                    <td class="p-3"><span class="text-xs font-bold ${req.classification.risk === 'high' ? 'text-red-600' : req.classification.risk === 'medium' ? 'text-yellow-600' : 'text-green-600'}">${req.classification.risk.toUpperCase()}</span></td>
                    <td class="p-3"><span class="text-xs font-bold ${(req.classification.ishonch_darajasi || 0) >= 80 ? 'text-green-600' : 'text-yellow-600'}">${req.classification.ishonch_darajasi || '?'}%</span></td>
                    <td class="p-3"><span class="text-xs px-2 py-0.5 rounded ${req.status === 'approved' ? 'bg-green-100 text-green-800' : req.status === 'rejected' ? 'bg-red-100 text-red-800' : 'bg-yellow-100 text-yellow-800'}">${req.status === 'approved' ? 'Tasdiqlangan' : req.status === 'rejected' ? 'Rad etilgan' : 'Kutilmoqda'}</span></td>
                    <td class="p-3 text-xs text-gray-500">${new Date(req.created_at).toLocaleString()}</td>
                    <td class="p-3 text-xs text-gray-500">${req.approved_at ? new Date(req.approved_at).toLocaleString() : '—'}</td>
                </tr>
            `).join('');
        }

        function getConfidenceColor(score) {
            if (!score) return 'text-gray-400';
            if (score >= 80) return 'text-green-600';
            if (score >= 60) return 'text-yellow-600';
            return 'text-red-600';
        }

        function getComplianceBadge(compliance) {
            if (!compliance) return '';
            if (compliance.muvofiq) {
                return `<span class="bg-green-100 text-green-800 text-xs px-2 py-0.5 rounded border border-green-300">✅ Qonunchilikka mos</span>`;
            } else {
                return `<span class="bg-red-100 text-red-800 text-xs px-2 py-0.5 rounded border border-red-300">⚠️ Muammo aniqlandi</span>`;
            }
        }

        async function saveEdit(id) {
            const textarea = document.getElementById(`edit-${id}`);
            const text = textarea.value;
            await fetch(`${API_URL}/requests/${id}/edit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text })
            });
            alert("✅ Javob saqlandi!");
        }

        async function fetchRequests() {
            const res = await fetch(`${API_URL}/requests`);
            const data = await res.json();
            allRequests = [...data].reverse();

            document.getElementById('statTotal').textContent = data.length;
            document.getElementById('statPending').textContent = data.filter(r => r.status === 'pending').length;
            document.getElementById('statApproved').textContent = data.filter(r => r.status === 'approved').length;
            document.getElementById('statRejected').textContent = data.filter(r => r.status === 'rejected').length;

            const container = document.getElementById('requestsList');
            if (data.length === 0) {
                container.innerHTML = `<p class="text-gray-500 italic">Hozircha murojaatlar yo'q...</p>`;
                return;
            }

            container.innerHTML = allRequests.map(req => {
                const isApproved = req.status === 'approved';
                const isRejected = req.status === 'rejected';
                const confidence = req.classification.ishonch_darajasi || 0;
                const compliance = req.compliance;
                const displayText = req.edited_response || req.draft_response;

                let statusBadge = `<span class="bg-yellow-100 text-yellow-800 text-xs font-medium px-2.5 py-0.5 rounded border border-yellow-300">Kutilmoqda</span>`;
                if (isApproved) statusBadge = `<span class="bg-green-100 text-green-800 text-xs font-medium px-2.5 py-0.5 rounded border border-green-300">Tasdiqlangan</span>`;
                if (isRejected) statusBadge = `<span class="bg-red-100 text-red-800 text-xs font-medium px-2.5 py-0.5 rounded border border-red-300">Rad etilgan</span>`;

                const formattedDraft = displayText
                    .replace(/\n/g, '<br>')
                    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

                return `
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-gray-50 border-b border-gray-200 p-4 flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-lg text-gray-800">${req.classification.mavzu || 'Noma\'lum'}</h3>
                            <div class="text-xs text-gray-500 mt-1 flex flex-wrap gap-3">
                                <span>📄 ${req.filename}</span>
                                <span>🏢 <b>${req.classification.tur.toUpperCase()}</b></span>
                                <span>⏳ <b>${req.classification.muddat_kun} kun</b></span>
                                <span class="${req.classification.risk === 'high' ? 'text-red-600 font-bold' : ''}">⚠️ Risk: ${req.classification.risk}</span>
                                <span class="${getConfidenceColor(confidence)} font-bold">🎯 Ishonch: ${confidence}%</span>
                                <span class="text-gray-400">🕐 ${new Date(req.created_at).toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="flex gap-2 items-center">
                            ${getComplianceBadge(compliance)}
                            ${statusBadge}
                        </div>
                    </div>

                    ${compliance && !compliance.muvofiq ? `
                    <div class="bg-red-50 border-b border-red-200 p-3">
                        <p class="text-xs font-bold text-red-700 mb-1">⚠️ Compliance muammolari:</p>
                        <ul class="text-xs text-red-600 list-disc list-inside">
                            ${compliance.muammolar.map(m => `<li>${m}</li>`).join('')}
                        </ul>
                        ${compliance.tavsiyalar.length > 0 ? `
                        <p class="text-xs font-bold text-blue-700 mt-2 mb-1">💡 Tavsiyalar:</p>
                        <ul class="text-xs text-blue-600 list-disc list-inside">
                            ${compliance.tavsiyalar.map(t => `<li>${t}</li>`).join('')}
                        </ul>` : ''}
                    </div>` : ''}

                    ${compliance && compliance.muvofiq ? `
<div class="bg-green-50 border-b border-green-200 p-3">
    <p class="text-xs text-green-700 font-bold mb-2">✅ ${compliance.xulosa}</p>
    ${compliance.qonunlar && compliance.qonunlar.length > 0 ? `
    <p class="text-xs text-gray-500 mb-1">📚 Javobda ishlatilgan qonunlar:</p>
    <div class="flex flex-wrap gap-2">
        ${compliance.qonunlar.map(q => `
            <a href="${typeof q === 'object' ? q.havola : '#'}" target="_blank"
               class="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded hover:bg-blue-200 transition border border-blue-200">
                📖 ${typeof q === 'object' ? q.nomi : q}
            </a>
        `).join('')}
    </div>` : '<p class="text-xs text-gray-400">Qonun moddalari aniqlanmadi</p>'}
</div>` : ''}

                    <div class="p-4 grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div class="bg-gray-50 p-4 rounded border border-gray-200">
                            <h4 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Asl Murojaat</h4>
                            <p class="text-sm text-gray-700 whitespace-pre-wrap">${req.text.substring(0, 300)}...</p>
                        </div>
                        <div class="bg-blue-50 p-4 rounded border border-blue-200">
                            <h4 class="text-xs font-bold text-blue-800 uppercase tracking-wider mb-2 flex justify-between">
                                AI Javob Loyihasi
                                ${req.edited_response ? '<span class="text-green-600 text-xs">✏️ Tahrirlangan</span>' : ''}
                            </h4>
                            ${req.status === 'pending' ? `
                            <textarea id="edit-${req.id}" class="w-full text-sm text-gray-800 bg-white border border-blue-200 rounded p-2 h-40 resize-none focus:outline-none focus:ring-2 focus:ring-blue-300">${displayText}</textarea>
                            <button onclick="saveEdit('${req.id}')" class="mt-2 text-xs text-blue-600 hover:text-blue-800 border border-blue-300 px-2 py-1 rounded">💾 Saqlash</button>
                            ` : `
                            <p class="text-sm text-gray-800 h-40 overflow-y-auto pr-2">${formattedDraft}</p>
                            `}
                        </div>
                    </div>

                    ${req.status === 'pending' ? `
                    <div class="p-4 border-t border-gray-200 bg-gray-50 flex justify-between items-center">
                        <div class="text-xs text-gray-400">
                            ${confidence < 70 ? '⚠️ Ishonch past — diqqat bilan tekshiring!' : ''}
                            ${compliance && !compliance.muvofiq ? '🔴 Compliance muammosi bor!' : ''}
                        </div>
                        <div class="flex gap-3">
                            <button onclick="updateStatus('${req.id}', 'reject')" class="px-4 py-2 text-sm font-medium text-red-600 bg-white border border-red-200 rounded-lg hover:bg-red-50 transition">Rad etish</button>
                            <button onclick="updateStatus('${req.id}', 'approve')" class="px-4 py-2 text-sm font-medium text-white bg-green-600 rounded-lg hover:bg-green-700 transition">✅ Tasdiqlash & Yuborish</button>
                        </div>
                    </div>
                    ` : `
                    <div class="p-4 border-t border-gray-200 bg-gray-50 text-xs text-gray-400 text-right">
                        ${req.approved_at ? `Amal bajarilgan: ${new Date(req.approved_at).toLocaleString()}` : ''}
                    </div>`}
                </div>`;
            }).join('');
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files.length) return;
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            const btn = document.getElementById('uploadBtn');
            btn.innerText = "⏳ Tahlil qilinmoqda...";
            btn.disabled = true;
            btn.classList.add('opacity-50');
            try {
                await fetch(`${API_URL}/upload`, { method: 'POST', body: formData });
                fileInput.value = "";
                fetchRequests();
            } catch (err) {
                alert("Xatolik yuz berdi!");
            } finally {
                btn.innerText = "+ Fayl Yuklash";
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        }

        async function updateStatus(id, action) {
            await fetch(`${API_URL}/requests/${id}/${action}`, { method: 'POST' });
            fetchRequests();
        }

        fetchRequests();
        setInterval(fetchRequests, 10000);
    </script>
</body>
</html>
