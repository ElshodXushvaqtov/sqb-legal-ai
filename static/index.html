<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQB Legal AI | Operator Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-blue-900 text-white p-4 shadow-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="text-xl font-bold tracking-wider">🏦 SQB Legal AI</div>
            <div class="text-sm">Yuridik Murojaatlarni Boshqarish Tizimi</div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-8 p-4">

        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 mb-8 flex justify-between items-center">
            <div>
                <h2 class="text-lg font-semibold text-blue-900">Yangi murojaat yuklash</h2>
                <p class="text-sm text-gray-500">Prokuratura, soliq yoki MB so'rovlarini (PDF/DOCX) yuklang.</p>
            </div>
            <div>
                <input type="file" id="fileInput" class="hidden" onchange="uploadFile()">
                <button id="uploadBtn" onclick="document.getElementById('fileInput').click()"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded shadow transition duration-200">
                    + Fayl Yuklash
                </button>
            </div>
        </div>

        <h2 class="text-xl font-bold text-gray-700 mb-4">So'nggi Murojaatlar</h2>
        <div id="requestsList" class="space-y-6">
            </div>

    </main>

    <script>
        const API_URL = "http://127.0.0.1:8000";

        async function fetchRequests() {
            const res = await fetch(`${API_URL}/requests`);
            const data = await res.json();
            const container = document.getElementById('requestsList');

            if (data.length === 0) {
                container.innerHTML = `<p class="text-gray-500 italic">Hozircha murojaatlar yo'q...</p>`;
                return;
            }

            // Reverse to show newest first
            container.innerHTML = data.reverse().map(req => {
                const isApproved = req.status === 'approved';
                const isRejected = req.status === 'rejected';

                let statusBadge = `<span class="bg-yellow-100 text-yellow-800 text-xs font-medium me-2 px-2.5 py-0.5 rounded border border-yellow-300">Kutilmoqda</span>`;
                if (isApproved) statusBadge = `<span class="bg-green-100 text-green-800 text-xs font-medium me-2 px-2.5 py-0.5 rounded border border-green-300">Tasdiqlangan</span>`;
                if (isRejected) statusBadge = `<span class="bg-red-100 text-red-800 text-xs font-medium me-2 px-2.5 py-0.5 rounded border border-red-300">Rad etilgan</span>`;

                // Convert markdown newlines to HTML breaks for the draft
                // This converts the newlines and makes the **text** bold
const formattedDraft = req.draft_response
    .replace(/\n/g, '<br>')
    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

                return `
                <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                    <div class="bg-gray-50 border-b border-gray-200 p-4 flex justify-between items-center">
                        <div>
                            <h3 class="font-bold text-lg text-gray-800">${req.classification.mavzu || 'Noma\'lum Mavzu'}</h3>
                            <div class="text-xs text-gray-500 mt-1 flex gap-3">
                                <span>📄 ${req.filename}</span>
                                <span>🏢 Tur: <b>${req.classification.tur.toUpperCase()}</b></span>
                                <span>⏳ Muddat: <b>${req.classification.muddat_kun} kun</b></span>
                                <span class="${req.classification.risk === 'high' ? 'text-red-600 font-bold' : ''}">⚠️ Risk: ${req.classification.risk}</span>
                            </div>
                        </div>
                        <div>${statusBadge}</div>
                    </div>

                    <div class="p-4 grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <div class="bg-gray-50 p-4 rounded border border-gray-200">
                            <h4 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Asl Murojaat (Qisqacha)</h4>
                            <p class="text-sm text-gray-700 whitespace-pre-wrap">${req.text.substring(0, 300)}...</p>
                        </div>

                        <div class="bg-blue-50 p-4 rounded border border-blue-200 relative group">
                            <h4 class="text-xs font-bold text-blue-800 uppercase tracking-wider mb-2 flex justify-between">
                                AI Javob Loyihasi
                                <button onclick="navigator.clipboard.writeText(\`${req.draft_response}\`)" class="text-blue-600 hover:text-blue-800 transition">📋 Nusxa Olish</button>
                            </h4>
                            <p class="text-sm text-gray-800 whitespace-pre-wrap h-40 overflow-y-auto pr-2">${formattedDraft}</p>
                        </div>
                    </div>

                    ${req.status === 'pending' ? `
                    <div class="p-4 border-t border-gray-200 bg-gray-50 flex justify-end gap-3">
                        <button onclick="updateStatus('${req.id}', 'reject')" class="px-4 py-2 text-sm font-medium text-red-600 bg-white border border-red-200 rounded-lg hover:bg-red-50 focus:ring-4 focus:ring-red-100 transition">Rad etish (Inson)</button>
                        <button onclick="updateStatus('${req.id}', 'approve')" class="px-4 py-2 text-sm font-medium text-white bg-green-600 rounded-lg hover:bg-green-700 focus:ring-4 focus:ring-green-300 transition">Tasdiqlash & Yuborish</button>
                    </div>
                    ` : ''}
                </div>
                `;
            }).join('');
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files.length) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const btn = document.getElementById('uploadBtn');
            const originalText = btn.innerText;
            btn.innerText = "⏳ Tahlil qilinmoqda...";
            btn.disabled = true;
            btn.classList.add('opacity-50');

            try {
                await fetch(`${API_URL}/upload`, { method: 'POST', body: formData });
                fileInput.value = ""; // Reset input
                fetchRequests();
            } catch (err) {
                alert("Xatolik yuz berdi!");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        }

        async function updateStatus(id, action) {
            await fetch(`${API_URL}/requests/${id}/${action}`, { method: 'POST' });
            fetchRequests();
        }

        // Initial load
        fetchRequests();
    </script>
</body>
</html>
